<!DOCTYPE html>

<title>💜Game💜</title>

<style>
body {
  font-family: 'Arial';
  text-align: center;
  background: linear-gradient(to right, #e0c3fc, #f5e6ff);
}

/* ปุ่ม */
button {
  margin: 8px;
  padding: 12px;
  border-radius: 15px;
  border: none;
  font-size: 16px;
  background: #d6b3ff;
  color: #4b0082;
  box-shadow: 0 5px #b388ff;
  transition: all 0.2s ease;
}
button:active {
  transform: translateY(4px);
}

/* 💜 ปุ่มที่เลือก (ใช้ร่วมกัน) */
.selected-cat, .selected-lang {
  outline: 6px solid #9333ea;
  background: #f5e6ff;
  transform: scale(1.1);
  box-shadow: 0 0 15px #c084fc, 0 0 25px #e9d5ff;
  position: relative;
  animation: glow 0.8s infinite;
}

.selected-cat::after,
.selected-lang::after {
  content: "✔";
  position: absolute;
  top: -10px;
  right: -10px;
  background: #22c55e;
  color: white;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  display: flex;
  align-items: center;
  justify-content: center;
}

@keyframes glow {
  0% { box-shadow: 0 0 10px #c084fc; }
  50% { box-shadow: 0 0 25px #a855f7; }
  100% { box-shadow: 0 0 10px #c084fc; }
}

/* ถูกผิด */
.selected { outline: 6px solid #9333ea; }
.correct { background: #dcfce7; outline: 4px solid #22c55e; }
.wrong { background: #fee2e2; outline: 4px solid #ef4444; }

/* card */
.card {
  background: white;
  width: 320px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 25px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.screen { display:none; }
.active { display:block; }

.emoji { font-size: 70px; }

.topbar {
  display:flex;
  justify-content: space-between;
}

/* 🐰 */
#bunny {
  font-size: 40px;
  display: none;
}
.jump {
  display: block;
  animation: jump 0.6s;
}
@keyframes jump {
  0% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
  100% { transform: translateY(0); }
}

/* 🎉 confetti */
#confetti {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 999;
}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="screen active">
  <h1>💜</h1>
  <input id="name" placeholder="Enter your name..." /><br>

  <h3>Mode</h3>
<button class="mode-btn" onclick="setMode(this,'word')">Words</button>
<button class="mode-btn" onclick="setMode(this,'math')">Math</button>

  <h3>language</h3>
  <button class="lang-btn" onclick="setLang(this,'en')">English</button>
  <button class="lang-btn" onclick="setLang(this,'zh')">Chinese</button>

  <h3>Category</h3>
  <button class="cat-btn" onclick="setCat(this,'animal')">🐶 Animals-สัตว์ 🐾</button>

<button class="cat-btn" onclick="setCat(this,'food')">🍔 Foods-อาหาร 🍎</button>

<button class="cat-btn" onclick="setCat(this,'transport')">🚗 Transports-ยานพาหนะ 🚆</button>

<button class="cat-btn" onclick="setCat(this,'color')">🎨 Colors-สี 🌈</button>

<button class="cat-btn" onclick="setCat(this,'number')">🔢 Numbers-เลข 🔟</button>

<button class="cat-btn" onclick="setCat(this,'school')">🏫 Schools-โรงเรียน ✏️</button>

  <br>
  <button onclick="startGame()">🎮START🎮</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="topbar">
    <h3>level: <span id="level">1/20</span></h3>
    <span id="player"></span>
    <button onclick="exitGame()">❌ออก❌</button>

    <div id="choices"></div>
    <div id="bunny">🐰</div>

    <p>❤️YOUR LIFE❤️ <span id="life">3</span></p>
  </div>
</div>

<!-- OVER -->
<div id="over" class="screen">
  <h1>💀 Game Over!</h1>
  <h2 id="final"></h2>
  <h3>🏆 Rank</h3>
  <div id="rank"></div>
  <button onclick="restart()">🎮RESTART🎮</button>
</div>

  /* 🔊 เสียง */
  function speak(obj){
  speechSynthesis.cancel(); // 💥 หยุดเสียงก่อนหน้า

  if(lang === "en"){
    let u = new SpeechSynthesisUtterance(obj.en);
    u.lang = "en-US";
    speechSynthesis.speak(u);

  } else if(lang === "zh"){
    let u = new SpeechSynthesisUtterance(obj.zh);
    u.lang = "zh-CN";
    speechSynthesis.speak(u);
  }
}
function repeatSpeak(){
  if(cur){
    speak(cur);
  }
}
  
  /* 💜 เลือกภาษา */
  function setLang(btn,l){
   lang=l;
   document.querySelectorAll(".lang-btn")
    .forEach(b=>b.classList.remove("selected-lang"));
   btn.classList.add("selected-lang");
  }
  
  /* 💜 เลือกหมวด */
  function setCat(btn,c){
   cat=c;
   document.querySelectorAll(".cat-btn")
    .forEach(b=>b.classList.remove("selected-cat"));
   btn.classList.add("selected-cat");
  }
  
  /* 🧠 เพิ่มโหมด */
  function setMode(btn,m){
   mode=m;
   document.querySelectorAll(".mode-btn")
    .forEach(b=>b.classList.remove("selected-cat"));
   btn.classList.add("selected-cat");
  }
  
  /* 화면 */
  function show(s){
   document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
   document.getElementById(s).classList.add("active");
  }
  
  function startGame(){
   name=document.getElementById("name").value || localStorage.getItem("name") || "User";
   localStorage.setItem("name",name);
   document.getElementById("player").innerText=name;
   show("game");
   nextQ();
  }
  
  let cur={},answer;
  let usedWords = [];
  
  /* 🎯 สร้างคำถาม */
  function nextQ(){
 document.getElementById("result").innerText="";
 document.getElementById("level").innerText=level+"/20";

 if(mode==="word"){
  let list = words[cat];

  // 💜 ถ้าใช้ครบแล้ว รีเซ็ต
  if(usedWords.length === list.length){
    usedWords = [];
  }

  // 💜 สุ่มแบบไม่ซ้ำ
  do {
    cur = list[Math.floor(Math.random()*list.length)];
  } while (usedWords.includes(cur));

  usedWords.push(cur); // จำคำที่ใช้แล้ว

  answer = cur[lang];

  document.getElementById("emoji").innerHTML = `
    <div style="font-size:60px">${cur.emoji}</div>
    <div>${cur.th}</div>
    ${lang==="zh" ? `<div style="color:#9333ea">${cur.pinyin}</div>` : ""}
  `;

  speak(cur);
  

// 💜 สุ่มตัวเลือก 3 ข้อ (มีคำตอบ + ตัวหลอก 2)
let ops = [answer];

// สุ่มตัวหลอก
while(ops.length < 3){
  let rand = list[Math.floor(Math.random()*list.length)][lang];
  if(!ops.includes(rand)){
    ops.push(rand);
  }
}

// สลับตำแหน่ง
ops.sort(()=>Math.random()-0.5);

// แสดงผล
let html="";
ops.forEach(o=>{
  html+=`<button class="choice" onclick="check(this,'${o}')">${o}</button>`;
});
document.getElementById("choices").innerHTML=html;

 }else{
   // ➕➖ คณิต
   let a=Math.floor(Math.random()*10);
   let b=Math.floor(Math.random()*10);
   let op=Math.random()>0.5?"+":"-";

   answer= op==="+" ? a+b : a-b;

   document.getElementById("emoji").innerText=a+" "+op+" "+b+" = ?";

   let ops=[answer,answer+1,answer-1].sort(()=>Math.random()-0.5);
   let html="";
   ops.forEach(o=>{
     html+=`<button class="choice" onclick="check(this,'${o}')">${o}</button>`;
   });
   document.getElementById("choices").innerHTML=html;
 }
}
  
  /* 🎯 ตรวจคำตอบ */
  function check(btn,ans){
   let res=document.getElementById("result");
   let all=document.querySelectorAll(".choice");
   let bunny=document.getElementById("bunny");
  
   all.forEach(b=>b.classList.remove("selected","correct","wrong"));
   btn.classList.add("selected");
  
   if(ans==answer){
    score++;
    level++; // 💜 เพิ่มเลเวล
    res.innerHTML="✅Great! ⭐";
    btn.classList.add("correct");
  
    confetti();
    playDing();
    bunny.classList.add("jump");
    setTimeout(()=>bunny.classList.remove("jump"),600);
  
   }else{
    life--;
    res.innerHTML="❌Try again❌";
    btn.classList.add("wrong");
  
    all.forEach(b=>{
      if(b.innerText==answer){
        b.classList.add("correct");
      }
    });
   }
  
   document.getElementById("score").innerText=score;
   document.getElementById("life").innerText=life;
  
   if(level>20 || life<=0){
    saveRank();
    showOver();
   }else{
    setTimeout(nextQ,1200);
   }
  }
  
  function exitGame(){
   if(confirm("ออกจากเกมไหม?")){
    location.reload();
   }
  }
  
  /* 🏆 อันดับ */
  function saveRank(){
   let ranks=JSON.parse(localStorage.getItem("rank")||"[]");
   ranks.push({name,score});
   ranks.sort((a,b)=>b.score-a.score);
   ranks=ranks.slice(0,5);
   localStorage.setItem("rank",JSON.stringify(ranks));
  }
  
  function showOver(){
   document.getElementById("final").innerText=name+" ได้ "+score+" คะแนน (level "+(level-1)+")";
   let ranks=JSON.parse(localStorage.getItem("rank")||"[]");
   let html="";
   ranks.forEach(r=>html+=`<p>${r.name} - ${r.score}</p>`);
   document.getElementById("rank").innerHTML=html;
   show("over");
  }
  
  function restart(){ location.reload(); }
  
  /* 🔊 เสียง */
  function playDing(){
   let audio=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
   audio.play();
  }
  
  /* 🎉 confetti */
  window.onload=function(){
   const canvas=document.getElementById("confetti");
   const ctx=canvas.getContext("2d");
  
   canvas.width=window.innerWidth;
   canvas.height=window.innerHeight;
  
   window.confetti=function(){
    for(let i=0;i<50;i++){
     ctx.fillStyle="hsl("+Math.random()*360+",100%,70%)";
     ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,5,5);
    }
    setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),500);
   };
  };
  </script>

</body>
</html>
